name: Build and Push Comdirect Auth Docker Image

on:
    push:
        tags:
            - "comdirect-auth-v*"

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository_owner }}/comdirect-auth

jobs:
    build-and-push:
        name: Build and Push
        runs-on: ubuntu-latest
        # Run only for plumbing-airflow release tags
        if: startsWith(github.ref, 'refs/tags/comdirect-auth-v')

        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v4
              with:
                  version: "latest"

            - name: Log in to the Container registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract tag name
              id: tag
              run: |
                  echo "TAG=${GITHUB_REF#refs/tags/comdirect-auth-}" >> $GITHUB_OUTPUT

            - name: Build and push Docker image
              uses: docker/build-push-action@v5
              with:
                  context: ./src
                  file: ./src/comdirect-auth/Dockerfile
                  push: true
                  platforms: linux/amd64
                  build-args: |
                      CI_COMMIT_HASH=${{ github.sha }}
                  tags: |
                      ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.TAG }}
                      ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

        outputs:
            tag: ${{ steps.tag.outputs.TAG }}
            app: comdirect-auth
